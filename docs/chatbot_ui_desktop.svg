    <text x="600" y="54" fill="#1F6D62" font-size="11" font-family="Trebuchet MS" letter-spacing="2.6">END-TO-END SCIENTIFIC RETRIEVAL</text>
    <text x="600" y="100" fill="#24170E" font-size="34" font-family="Georgia" font-weight="700">Scientific document retrieval with traceable evidence</text>
    <text x="600" y="162" fill="#6E5A4A" font-size="16" font-family="Trebuchet MS">OCR, chunking, hybrid search, reranking, and cited answers are combined</text>
    <text x="600" y="188" fill="#6E5A4A" font-size="16" font-family="Trebuchet MS">into one research workflow for scientific document retrieval.</text>

