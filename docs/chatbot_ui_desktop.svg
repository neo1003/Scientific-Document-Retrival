    <text x="44" y="140" fill="#6E5A4A" font-size="16" font-family="Trebuchet MS">Scientific passage retrieval, reranking, and grounded</text>
    <text x="44" y="166" fill="#6E5A4A" font-size="16" font-family="Trebuchet MS">question answering for OCR-processed literature</text>
    <text x="44" y="192" fill="#6E5A4A" font-size="16" font-family="Trebuchet MS">collections.</text>

    <rect x="44" y="238" width="412" height="412" rx="28" fill="#FFFBF5" fill-opacity="0.84" stroke="#37291B" stroke-opacity="0.08"/>
