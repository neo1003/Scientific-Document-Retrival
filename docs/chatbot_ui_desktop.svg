    <rect x="672" y="498" width="764" height="108" rx="26" fill="#F6EFE5"/>
    <text x="708" y="532" fill="#24170E" font-size="16" font-family="Trebuchet MS">Ask about methods, cohorts, biomarkers, limitations, or reported</text>
    <text x="708" y="558" fill="#24170E" font-size="16" font-family="Trebuchet MS">findings and I will answer from cited evidence.</text>

    <rect x="1100" y="708" width="382" height="122" rx="28" fill="url(#accent)"/>
    <text x="1140" y="748" fill="#FFF9F1" font-size="16" font-family="Trebuchet MS">How do the compared eGFR equations</text>
    <text x="1140" y="774" fill="#FFF9F1" font-size="16" font-family="Trebuchet MS">perform in AKI?</text>
    <rect x="1510" y="744" width="56" height="56" rx="18" fill="url(#warm)"/>
    <text x="1538" y="777" text-anchor="middle" fill="#FFF9F1" font-size="12" font-family="Trebuchet MS" font-weight="700">YOU</text>

    <rect x="600" y="914" width="52" height="52" rx="18" fill="url(#warm)"/>
    <text x="626" y="946" text-anchor="middle" fill="#FFF9F1" font-size="15" font-family="Trebuchet MS" font-weight="700">AI</text>
    <rect x="672" y="914" width="858" height="208" rx="26" fill="#F6EFE5"/>
    <text x="708" y="952" fill="#24170E" font-size="16" font-family="Trebuchet MS">The page compares multiple eGFR equations used for critically ill</text>
    <text x="708" y="978" fill="#24170E" font-size="16" font-family="Trebuchet MS">patients with AKI, emphasizing how well each tracks rapidly changing</text>
    <text x="708" y="1004" fill="#24170E" font-size="16" font-family="Trebuchet MS">renal function and where their measurement limitations appear.</text>
    <text x="708" y="1030" fill="#24170E" font-size="16" font-family="Trebuchet MS">[PMC3576793-leaf-002]</text>

    <text x="600" y="1248" fill="#6E5A4A" font-size="14" font-family="Trebuchet MS">Research question</text>
    <rect x="600" y="1272" width="1048" height="106" rx="26" fill="#FFFFFF" fill-opacity="0.92" stroke="#37291B" stroke-opacity="0.1"/>
