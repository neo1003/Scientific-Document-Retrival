    <text x="1912" y="440" fill="#24170E" font-size="34" font-family="Georgia" font-weight="700">Retrieved Passages</text>

    <rect x="1912" y="524" width="500" height="224" rx="28" fill="#FFFDF8" stroke="#37291B" stroke-opacity="0.08"/>
    <text x="1950" y="562" fill="#1F6D62" font-size="14" font-family="Trebuchet MS">PMC3576793-leaf-002</text>
    <text x="1950" y="594" fill="#1F6D62" font-size="13" font-family="Trebuchet MS">PMC3576793_00004 • Discussion</text>
    <text x="1950" y="626" fill="#1F6D62" font-size="13" font-family="Trebuchet MS">hybrid 0.0152 • rerank 96</text>
    <text x="1950" y="672" fill="#6E5A4A" font-size="14" font-family="Trebuchet MS">The page compares eGFR equations in critically ill</text>
    <text x="1950" y="696" fill="#6E5A4A" font-size="14" font-family="Trebuchet MS">patients and discusses the challenge of measuring</text>
    <text x="1950" y="720" fill="#6E5A4A" font-size="14" font-family="Trebuchet MS">rapidly changing renal function.</text>

    <rect x="1912" y="816" width="500" height="212" rx="28" fill="#FFFDF8" stroke="#37291B" stroke-opacity="0.08"/>
    <text x="1950" y="854" fill="#1F6D62" font-size="14" font-family="Trebuchet MS">PMC3576793-leaf-004</text>
    <text x="1950" y="886" fill="#1F6D62" font-size="13" font-family="Trebuchet MS">PMC3576793_00005 • Results</text>
    <text x="1950" y="918" fill="#1F6D62" font-size="13" font-family="Trebuchet MS">hybrid 0.0136 • rerank 88</text>
    <text x="1950" y="964" fill="#6E5A4A" font-size="14" font-family="Trebuchet MS">Additional context explains the assumptions and</text>
    <text x="1950" y="988" fill="#6E5A4A" font-size="14" font-family="Trebuchet MS">comparative performance of the equations.</text>
