    <text x="638" y="1312" fill="#6E5A4A" font-size="15" font-family="Trebuchet MS">Ask about study design, biomarker results, limitations, or comparative</text>
    <text x="638" y="1336" fill="#6E5A4A" font-size="15" font-family="Trebuchet MS">findings...</text>
    <text x="1510" y="1342" text-anchor="middle" fill="#FFF9F1" font-size="15" font-family="Trebuchet MS" font-weight="700">Run Retrieval</text>

