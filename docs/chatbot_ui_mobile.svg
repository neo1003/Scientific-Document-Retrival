  <rect x="212" y="392" width="180" height="42" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#37291B" stroke-opacity="0.1"/>
  <text x="229" y="418" fill="#24170E" font-size="15" font-family="Trebuchet MS">Vector 12</text>
  <rect x="406" y="392" width="236" height="42" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#37291B" stroke-opacity="0.1"/>
