  <text x="52" y="558" fill="#24170E" font-size="28" font-family="Georgia" font-weight="700">Literature Assistant</text>

  <rect x="52" y="590" width="42" height="42" rx="14" fill="url(#warm)"/>
  <text x="73" y="616" text-anchor="middle" fill="#FFF9F1" font-size="14" font-family="Trebuchet MS" font-weight="700">AI</text>
  <rect x="106" y="590" width="516" height="74" rx="18" fill="#F6EFE5"/>
  <text x="128" y="620" fill="#24170E" font-size="16" font-family="Trebuchet MS">Ask about methods, cohorts, biomarkers, or findings</text>
  <text x="128" y="643" fill="#24170E" font-size="16" font-family="Trebuchet MS">and I’ll answer from reranked cited evidence.</text>

  <rect x="202" y="694" width="372" height="82" rx="18" fill="url(#accent)"/>
  <text x="224" y="725" fill="#FFF9F1" font-size="15" font-family="Trebuchet MS">What limitations are reported for tracking</text>
  <text x="224" y="748" fill="#FFF9F1" font-size="15" font-family="Trebuchet MS">rapid renal function changes?</text>
  <rect x="586" y="714" width="42" height="42" rx="14" fill="url(#warm)"/>
  <text x="607" y="740" text-anchor="middle" fill="#FFF9F1" font-size="12" font-family="Trebuchet MS" font-weight="700">YOU</text>

  <rect x="52" y="804" width="42" height="42" rx="14" fill="url(#warm)"/>
  <text x="73" y="830" text-anchor="middle" fill="#FFF9F1" font-size="14" font-family="Trebuchet MS" font-weight="700">AI</text>
  <rect x="106" y="804" width="532" height="128" rx="18" fill="#F6EFE5"/>
  <text x="128" y="836" fill="#24170E" font-size="15" font-family="Trebuchet MS">The retrieved passages say rapid renal function changes are</text>
  <text x="128" y="859" fill="#24170E" font-size="15" font-family="Trebuchet MS">difficult to capture accurately with static eGFR equations,</text>
  <text x="128" y="882" fill="#24170E" font-size="15" font-family="Trebuchet MS">especially in critically ill patients with AKI.</text>
  <text x="128" y="905" fill="#24170E" font-size="15" font-family="Trebuchet MS">[PMC3576793-leaf-002]</text>

  <text x="52" y="982" fill="#1F6D62" font-size="11" font-family="Trebuchet MS" letter-spacing="2.5">EVIDENCE PANEL</text>
  <text x="52" y="1020" fill="#24170E" font-size="28" font-family="Georgia" font-weight="700">Retrieved Passages</text>
  <rect x="52" y="1048" width="616" height="152" rx="24" fill="#FFFDF8" stroke="#37291B" stroke-opacity="0.08"/>
  <text x="78" y="1080" fill="#1F6D62" font-size="14" font-family="Trebuchet MS">PMC3576793-leaf-002</text>
  <text x="78" y="1104" fill="#1F6D62" font-size="13" font-family="Trebuchet MS">hybrid 0.0152 • rerank 96 • Discussion</text>
  <text x="78" y="1140" fill="#6E5A4A" font-size="15" font-family="Trebuchet MS">The page compares eGFR equations and the challenge of</text>
  <text x="78" y="1163" fill="#6E5A4A" font-size="15" font-family="Trebuchet MS">tracking rapidly changing renal function in AKI.</text>

  <text x="52" y="1248" fill="#6E5A4A" font-size="14" font-family="Trebuchet MS">Research question</text>
  <rect x="52" y="1266" width="616" height="94" rx="22" fill="#FFFFFF" fill-opacity="0.92" stroke="#37291B" stroke-opacity="0.1"/>
  <text x="78" y="1318" fill="#6E5A4A" font-size="15" font-family="Trebuchet MS">Ask about study design, biomarkers, limitations, or findings...</text>
  <rect x="482" y="1316" width="186" height="44" rx="22" fill="url(#accent)"/>
  <text x="575" y="1343" text-anchor="middle" fill="#FFF9F1" font-size="15" font-family="Trebuchet MS" font-weight="700">Run Retrieval</text>
