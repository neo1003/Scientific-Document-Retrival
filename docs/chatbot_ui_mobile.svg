  <rect x="242" y="266" width="124" height="32" rx="16" fill="#FFFDF8" stroke="#37291B" stroke-opacity="0.08"/>
  <text x="260" y="287" fill="#6E5A4A" font-size="13" font-family="Trebuchet MS">Search</text>
